<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror / Fragment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Cormorant Garamond', serif;
      }

      /* ── MIRROR VIDEO (full screen, mirrored) ── */
      #mirror-video {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #mirror-video.ready { opacity: 1; }

      /* very subtle dark veil so text stays legible */
      #mirror-veil {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.28);
        pointer-events: none;
      }

      /* ── OVERLAY FORM ── */
      #selection-screen {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        z-index: 10;
        transition: opacity 0.8s ease;
      }
      #selection-screen.hide {
        opacity: 0;
        pointer-events: none;
      }

      .form-wrap {
        width: min(88vw, 360px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 3vw, 26px);
      }

      .form-title {
        font-style: italic;
        font-weight: 300;
        font-size: clamp(32px, 7vw, 52px);
        color: rgba(255,255,255,0.9);
        text-align: center;
        letter-spacing: 0.02em;
        line-height: 1.1;
        text-shadow: 0 1px 24px rgba(0,0,0,0.4);
      }

      .form-rule {
        width: 32px; height: 1px;
        background: rgba(255,255,255,0.35);
      }

      .fields {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 2vw, 14px);
      }

      .fields input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.4);
        padding: 10px 2px;
        color: #fff;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(18px, 4vw, 24px);
        letter-spacing: 0.04em;
        outline: none;
        transition: border-color 0.25s;
        text-align: center;
      }
      .fields input::placeholder {
        color: rgba(255,255,255,0.35);
      }
      .fields input:focus {
        border-color: rgba(255,255,255,0.85);
      }

      #error-msg {
        font-style: italic;
        font-weight: 300;
        font-size: clamp(11px, 2vw, 13px);
        color: rgba(255,200,190,0.85);
        letter-spacing: 0.08em;
        text-align: center;
        min-height: 16px;
        opacity: 0;
        transition: opacity 0.3s;
      }
      #error-msg.visible { opacity: 1; }

      .form-btn {
        background: none;
        border: 1px solid rgba(255,255,255,0.5);
        color: rgba(255,255,255,0.85);
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(13px, 2.5vw, 16px);
        letter-spacing: 0.18em;
        padding: clamp(10px,2vw,13px) clamp(28px,5vw,44px);
        cursor: pointer;
        transition: background 0.25s, color 0.25s, border-color 0.25s;
      }
      .form-btn:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.85);
        color: #fff;
      }

      /* ── SKETCH SITS BEHIND EVERYTHING after selection ── */
      #sketch-container {
        position: fixed; inset: 0;
        z-index: 0;
      }
    </style>
  </head>
  <body>

    <!-- Raw webcam mirror, no p5 yet -->
    <video id="mirror-video" autoplay playsinline muted></video>
    <div id="mirror-veil"></div>

    <div id="selection-screen">
      <div class="form-wrap">
        <h1 class="form-title">Who are<br>you?</h1>
        <div class="form-rule"></div>
        <div class="fields">
          <input id="inp-first" type="text" placeholder="First name"
                 autocomplete="given-name" spellcheck="false" />
          <input id="inp-last"  type="text" placeholder="Last name"
                 autocomplete="family-name" spellcheck="false" />
        </div>
        <div id="error-msg">Name not recognised.</div>
        <button class="form-btn" onclick="submitName()">Enter</button>
      </div>
    </div>

    <div id="sketch-container"></div>
    <script src="sketch.js"></script>

    <script>
      // Start webcam immediately for the mirror effect
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(stream) {
          const v = document.getElementById('mirror-video');
          v.srcObject = stream;
          v.onloadedmetadata = function() {
            v.classList.add('ready');
          };
        })
        .catch(function(err) {
          console.warn('Camera not available:', err);
        });

      // Name → sketch user key
      // First-name match is enough; add full names if you need to distinguish
      const NAME_MAP = {
        "clara":   "clara",
        "laura":   "laura",
        "mariana": "mariana"
      };

      function submitName() {
        const first = document.getElementById('inp-first').value.trim().toLowerCase();
        const last  = document.getElementById('inp-last').value.trim().toLowerCase();
        const full  = (first + ' ' + last).trim();
        const err   = document.getElementById('error-msg');

        const user = NAME_MAP[full] || NAME_MAP[first] || null;

        if (!user) {
          err.classList.add('visible');
          return;
        }
        err.classList.remove('visible');
        window.selectedUser = user;

        // Hide the raw video + veil — p5 will take over
        document.getElementById('mirror-video').style.transition = 'opacity 0.5s';
        document.getElementById('mirror-video').style.opacity = '0';
        document.getElementById('mirror-veil').style.opacity  = '0';

        // Fade out overlay
        document.getElementById('selection-screen').classList.add('hide');

        setTimeout(function() {
          document.getElementById('selection-screen').style.display = 'none';
          document.getElementById('mirror-video').style.display     = 'none';
          window.startSketch();
        }, 850);
      }

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') submitName();
      });
    </script>
  </body>
</html>
