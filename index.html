<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror / Fragment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Cormorant Garamond', serif;
      }

      /* ── MIRROR VIDEO (initial state) ── */
      #mirror-video {
        position: fixed; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0;
        transition: opacity 1.2s ease;
      }
      #mirror-video.ready { opacity: 1; }

      #mirror-veil {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.35);
        pointer-events: none;
      }

      /* ── OVERLAY MESSAGES (Layered above everything) ── */
      #overlay-messages {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100; /* Ensure this is above the p5 canvas */
        pointer-events: none;
        text-align: center;
      }

      .assignment-text {
        font-style: italic;
        font-weight: 300;
        font-size: clamp(24px, 5vw, 42px);
        color: rgba(255,255,255,0.9);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.8s ease, visibility 0.8s;
        max-width: 750px;
        line-height: 1.3;
        letter-spacing: 0.02em;
      }

      #instruction-msg {
        position: fixed;
        bottom: 50px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.5);
        font-size: clamp(12px, 2vw, 14px);
        letter-spacing: 0.2em;
        font-style: italic;
        text-transform: uppercase;
        opacity: 0;
        visibility: hidden;
        transition: opacity 1s ease, visibility 1s;
        z-index: 110; 
        pointer-events: none;
      }

      /* Force visibility */
      .visible-now { 
        opacity: 1 !important; 
        visibility: visible !important; 
      }

      /* ── SELECTION SCREEN ── */
      #selection-screen {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        z-index: 200;
        transition: opacity 0.8s ease;
      }
      #selection-screen.hide {
        opacity: 0;
        pointer-events: none;
      }

      .form-wrap {
        width: min(88vw, 360px);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 26px;
      }

      .form-title {
        font-style: italic;
        font-weight: 300;
        font-size: clamp(32px, 7vw, 52px);
        color: rgba(255,255,255,0.9);
        text-align: center;
        letter-spacing: 0.02em;
        line-height: 1.1;
      }

      .form-rule { width: 32px; height: 1px; background: rgba(255,255,255,0.35); }

      .fields {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .fields input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 1px solid rgba(255,255,255,0.4);
        padding: 10px 2px;
        color: #fff;
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        font-size: 24px;
        outline: none;
        text-align: center;
      }

      #error-msg {
        font-style: italic;
        font-size: 13px;
        color: rgba(255,200,190,0.85);
        opacity: 0;
        transition: opacity 0.3s;
      }
      #error-msg.visible { opacity: 1; }

      .form-btn {
        background: none;
        border: 1px solid rgba(255,255,255,0.5);
        color: rgba(255,255,255,0.85);
        font-family: 'Cormorant Garamond', serif;
        font-style: italic;
        letter-spacing: 0.18em;
        padding: 12px 40px;
        cursor: pointer;
        transition: all 0.25s;
      }
      .form-btn:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }

      #sketch-container { position: fixed; inset: 0; z-index: 10; }
    </style>
  </head>
  <body>

    <video id="mirror-video" autoplay playsinline muted></video>
    <div id="mirror-veil"></div>

    <!-- Messages Layer -->
    <div id="overlay-messages">
      <div id="assignment-msg" class="assignment-text">
        Fix the mirror and see who you<br>really are on the internet.
      </div>
    </div>

    <div id="instruction-msg">
      Click a fragment or hold up 1–6 fingers to switch
    </div>

    <!-- Login Form -->
    <div id="selection-screen">
      <div class="form-wrap">
        <h1 class="form-title">Who are<br>you?</h1>
        <div class="form-rule"></div>
        <div class="fields">
          <input id="inp-first" type="text" placeholder="First name" autocomplete="off" />
          <input id="inp-last"  type="text" placeholder="Last name" autocomplete="off" />
        </div>
        <div id="error-msg">Name not recognised.</div>
        <button class="form-btn" onclick="submitName()">Enter</button>
      </div>
    </div>

    <div id="sketch-container"></div>
    <script src="sketch.js"></script>

    <script>
      // Setup Webcam
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
        .then(function(stream) {
          const v = document.getElementById('mirror-video');
          v.srcObject = stream;
          v.onloadedmetadata = function() { v.classList.add('ready'); };
        })
        .catch(function(err) { console.warn('Camera not available:', err); });

      const NAME_MAP = { "clara": "clara", "laura": "laura", "mariana": "mariana" };

      function submitName() {
        const first = document.getElementById('inp-first').value.trim().toLowerCase();
        const last  = document.getElementById('inp-last').value.trim().toLowerCase();
        const user  = NAME_MAP[first + ' ' + last] || NAME_MAP[first] || null;

        if (!user) {
          document.getElementById('error-msg').classList.add('visible');
          return;
        }
        
        window.selectedUser = user;
        document.getElementById('selection-screen').classList.add('hide');

        setTimeout(function() {
          document.getElementById('selection-screen').style.display = 'none';
          // Show the assignment message
          document.getElementById('assignment-msg').classList.add('visible-now');
          
          // Hide raw video so p5 can take over
          document.getElementById('mirror-video').style.opacity = '0';
          document.getElementById('mirror-veil').style.opacity  = '0';
          
          window.startSketch();
        }, 850);
      }

      document.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitName(); });
    </script>
  </body>
</html>
